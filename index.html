<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硅基OLED行业监控面板 | 芯视佳专用</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; }
  
  /* 顶部标题栏 */
  .header {
    background: linear-gradient(135deg, #0a0e1a 0%, #0d1b35 50%, #0a0e1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .update-time { color: var(--text2); font-size: 12px; }
  .update-time strong { color: var(--accent); }
  .refresh-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; padding: 6px 16px; border-radius: 6px;
    cursor: pointer; font-size: 12px; font-weight: 600;
    transition: opacity 0.2s;
  }
  .refresh-btn:hover { opacity: 0.85; }

  /* 导航标签 */
  .nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 0; overflow-x: auto; }
  .nav-item {
    padding: 12px 20px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; font-size: 13px; transition: all 0.2s;
  }
  .nav-item:hover { color: var(--text); }
  .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* 主内容区 */
  .main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* 通用卡片 */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title::before { content: ''; width: 3px; height: 16px; background: var(--accent); border-radius: 2px; }

  /* 网格布局 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }

  /* KPI 指标卡 */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi-card {
    background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center;
  }
  .kpi-card .label { color: var(--text2); font-size: 11px; margin-bottom: 8px; }
  .kpi-card .value { font-size: 22px; font-weight: 700; color: var(--accent); }
  .kpi-card .sub { color: var(--text3); font-size: 11px; margin-top: 4px; }
  .kpi-card .change-up { color: var(--red); font-size: 12px; font-weight: 600; }
  .kpi-card .change-down { color: var(--green); font-size: 12px; font-weight: 600; }

  /* 图表容器 */
  .chart-wrap { position: relative; height: 260px; }

  /* 竞争对手卡片 */
  .competitor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .comp-card {
    background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; transition: border-color 0.2s;
  }
  .comp-card:hover { border-color: var(--accent); }
  .comp-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .comp-name { font-size: 15px; font-weight: 700; }
  .comp-label { font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .label-core { background: rgba(239,68,68,0.15); color: var(--red); }
  .label-indirect { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .label-potential { background: rgba(100,116,139,0.15); color: var(--text2); }
  .comp-desc { color: var(--text2); font-size: 12px; line-height: 1.6; margin-bottom: 12px; }
  .comp-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--card); border-radius: 6px; padding: 8px; text-align: center; }
  .metric .m-label { color: var(--text3); font-size: 10px; margin-bottom: 3px; }
  .metric .m-value { color: var(--text); font-size: 12px; font-weight: 600; }
  .comp-stock { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--card); border-radius: 6px; margin-bottom: 10px; }
  .stock-price { font-size: 18px; font-weight: 700; }
  .stock-up { color: var(--red); }
  .stock-down { color: var(--green); }
  .stock-info { color: var(--text2); font-size: 11px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: rgba(0,212,255,0.1); color: var(--accent); }
  .tag-red { background: rgba(239,68,68,0.1); color: var(--red); }
  .adv-list, .dis-list { margin-top: 8px; }
  .adv-list li, .dis-list li { font-size: 11px; color: var(--text2); padding: 2px 0; padding-left: 12px; position: relative; line-height: 1.5; }
  .adv-list li::before { content: '✓'; color: var(--green); position: absolute; left: 0; }
  .dis-list li::before { content: '✗'; color: var(--red); position: absolute; left: 0; }
  .section-subtitle { font-size: 12px; color: var(--text2); font-weight: normal; margin-left: 4px; }

  /* 芯视佳信息 */
  .xinshijia-header {
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(124,58,237,0.1));
    border: 1px solid rgba(0,212,255,0.3); border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .xsj-title { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .xsj-subtitle { color: var(--text2); font-size: 13px; line-height: 1.8; }
  .financing-timeline { position: relative; padding-left: 24px; }
  .financing-timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .f-item { position: relative; margin-bottom: 20px; }
  .f-item::before { content: ''; position: absolute; left: -20px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
  .f-round { font-size: 15px; font-weight: 700; color: var(--accent); }
  .f-date { color: var(--text2); font-size: 12px; margin: 2px 0; }
  .f-amount { font-size: 22px; font-weight: 700; color: var(--yellow); }
  .f-investor { color: var(--text2); font-size: 12px; margin: 4px 0; }
  .f-purpose { color: var(--text); font-size: 12px; margin-top: 4px; padding: 6px 10px; background: var(--card2); border-radius: 6px; }
  .production-line { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pl-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pl-name { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .pl-status { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
  .status-active { background: rgba(16,185,129,0.15); color: var(--green); }
  .status-building { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status-planned { background: rgba(100,116,139,0.15); color: var(--text2); }
  .pl-info { font-size: 11px; color: var(--text2); line-height: 1.8; }

  /* SWOT */
  .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .swot-item { border-radius: 10px; padding: 16px; }
  .swot-s { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); }
  .swot-w { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
  .swot-o { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.3); }
  .swot-t { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); }
  .swot-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .swot-s .swot-title { color: var(--green); }
  .swot-w .swot-title { color: var(--red); }
  .swot-o .swot-title { color: var(--accent); }
  .swot-t .swot-title { color: var(--yellow); }
  .swot-list li { font-size: 12px; color: var(--text2); padding: 3px 0; padding-left: 14px; position: relative; line-height: 1.5; list-style: none; }
  .swot-list li::before { content: '•'; position: absolute; left: 0; }
  .swot-s .swot-list li::before { color: var(--green); }
  .swot-w .swot-list li::before { color: var(--red); }
  .swot-o .swot-list li::before { color: var(--accent); }
  .swot-t .swot-list li::before { color: var(--yellow); }

  /* 投资动态 */
  .investment-table { width: 100%; border-collapse: collapse; }
  .investment-table th { background: var(--card2); color: var(--text2); padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
  .investment-table td { padding: 10px 12px; border-bottom: 1px solid rgba(30,58,95,0.5); font-size: 12px; color: var(--text2); }
  .investment-table tr:hover td { background: rgba(0,212,255,0.03); }
  .investment-table td:nth-child(4) { color: var(--yellow); font-weight: 600; }
  .our-company td { color: var(--accent) !important; font-weight: 600; }
  .our-company td:nth-child(4) { color: var(--accent) !important; }

  /* 新闻 */
  .news-list { display: flex; flex-direction: column; gap: 10px; }
  .news-item { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
  .news-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .news-dot.high { background: var(--red); }
  .news-dot.medium { background: var(--yellow); }
  .news-dot.low { background: var(--text3); }
  .news-content { flex: 1; }
  .news-title { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.5; margin-bottom: 4px; }
  .news-meta { font-size: 11px; color: var(--text3); display: flex; gap: 12px; }
  .news-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .badge-high { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-medium { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .badge-low { background: rgba(100,116,139,0.15); color: var(--text3); }

  /* 政策趋势 */
  .policy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .policy-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .policy-issuer { font-size: 11px; color: var(--accent); margin-bottom: 8px; }
  .policy-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
  .policy-impact { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .trend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .trend-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .trend-icon { font-size: 20px; margin-bottom: 8px; }
  .trend-name { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .trend-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }

  /* 分隔条 */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* 梯队卡片 */
  .tier-card { background: var(--card2); border-radius: 10px; padding: 14px; border-left: 3px solid; margin-bottom: 10px; }
  .tier-1 { border-color: var(--red); }
  .tier-2 { border-color: var(--yellow); }
  .tier-3 { border-color: var(--text3); }
  .tier-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .tier-1 .tier-title { color: var(--red); }
  .tier-2 .tier-title { color: var(--yellow); }
  .tier-3 .tier-title { color: var(--text2); }
  .tier-companies { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .tier-company { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--card); color: var(--text); }
  .tier-desc { font-size: 12px; color: var(--text2); }

  /* 响应式 */
  @media (max-width: 1024px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .competitor-grid { grid-template-columns: 1fr; }
    .production-line { grid-template-columns: 1fr; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .trend-grid, .policy-grid { grid-template-columns: 1fr; }
    .swot-grid { grid-template-columns: 1fr; }
    .product-detail-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 10px; align-items: flex-start; }
    .main { padding: 12px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .product-grid { grid-template-columns: 1fr !important; }
    .product-table-wrap { font-size: 11px; }
  }

  /* 产品追踪 */
  .product-summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .product-summary-card {
    background: linear-gradient(135deg, var(--card2), var(--card));
    border: 1px solid var(--border); border-radius: 10px; padding: 16px;
    text-align: center; transition: border-color 0.2s;
  }
  .product-summary-card:hover { border-color: var(--accent); }
  .ps-icon { font-size: 24px; margin-bottom: 8px; }
  .ps-count { font-size: 26px; font-weight: 700; color: var(--accent); }
  .ps-label { color: var(--text2); font-size: 11px; margin-top: 4px; }
  .ps-sub { color: var(--text3); font-size: 10px; margin-top: 2px; }

  .product-category { font-size: 14px; font-weight: 700; color: var(--accent); margin: 16px 0 10px 0; padding-left: 10px; border-left: 3px solid var(--accent); }
  .product-category:first-child { margin-top: 0; }

  .product-table-wrap { overflow-x: auto; }
  .product-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .product-table th {
    background: var(--card2); color: var(--text2); padding: 10px 8px; text-align: left;
    font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border);
    white-space: nowrap; position: sticky; top: 0; z-index: 1;
  }
  .product-table td { padding: 10px 8px; border-bottom: 1px solid rgba(30,58,95,0.5); color: var(--text2); vertical-align: top; }
  .product-table tr:hover td { background: rgba(0,212,255,0.03); }
  .product-table .pname { color: var(--text); font-weight: 600; white-space: nowrap; }
  .product-table .brand { color: var(--accent); font-weight: 600; white-space: nowrap; }
  .product-table .screen-info { color: var(--text); font-size: 11px; line-height: 1.6; }
  .product-table .screen-info strong { color: var(--accent); }
  .product-table .sales-num { color: var(--yellow); font-weight: 700; font-size: 13px; white-space: nowrap; }
  .product-table .tag-sm { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin: 1px 2px; }
  .tag-vr { background: rgba(0,212,255,0.12); color: var(--accent); }
  .tag-ar { background: rgba(16,185,129,0.12); color: var(--green); }
  .tag-evf { background: rgba(245,158,11,0.12); color: var(--yellow); }
  .tag-drone { background: rgba(139,92,246,0.12); color: #a78bfa; }
  .tag-special { background: rgba(239,68,68,0.12); color: var(--red); }

  .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .product-detail-card {
    background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; transition: border-color 0.2s; cursor: pointer;
  }
  .product-detail-card:hover { border-color: var(--accent); }
  .pd-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .pd-emoji { font-size: 28px; }
  .pd-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .pd-brand { font-size: 11px; color: var(--text2); }
  .pd-tags { margin-bottom: 10px; }
  .pd-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .pd-spec { background: var(--card); border-radius: 6px; padding: 6px 8px; }
  .pd-spec-label { color: var(--text3); font-size: 10px; }
  .pd-spec-value { color: var(--text); font-size: 11px; font-weight: 600; margin-top: 2px; }
  .pd-sales { margin-top: 10px; padding: 8px 10px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 6px; }
  .pd-sales-label { font-size: 10px; color: var(--yellow); }
  .pd-sales-value { font-size: 18px; font-weight: 700; color: var(--yellow); }
  .pd-sales-note { font-size: 10px; color: var(--text3); margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🔭 硅基OLED行业监控面板<span>深圳市芯视佳半导体科技有限公司 专用</span></div>
  </div>
  <div class="header-right">
    <div class="update-time">数据更新：<strong id="updateTime">加载中...</strong></div>
    <button class="refresh-btn" onclick="location.reload()">🔄 刷新</button>
  </div>
</div>

<div class="nav" id="navBar">
  <div class="nav-item" onclick="showSection('market', this)">📊 市场总览</div>
  <div class="nav-item" onclick="showSection('competition', this)">⚔️ 竞争格局</div>
  <div class="nav-item" onclick="showSection('products', this)">📱 产品追踪</div>
  <div class="nav-item" onclick="showSection('xinshijia', this)">🏢 芯视佳</div>
  <div class="nav-item" onclick="showSection('investment', this)">💰 投资动态</div>
  <div class="nav-item" onclick="showSection('news', this)">📰 行业新闻</div>
  <div class="nav-item" onclick="showSection('policy', this)">📋 趋势政策</div>
</div>

<div class="main">

  <!-- 市场总览 -->
  <div class="section active" id="market">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">全球市场规模趋势（亿元）</div>
        <div class="chart-wrap"><canvas id="marketChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">全球出货量趋势（万块）</div>
        <div class="chart-wrap"><canvas id="shipmentChart"></canvas></div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">下游应用分布（2024年）</div>
        <div class="chart-wrap"><canvas id="appChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">全球市场份额（2024年出货量）</div>
        <div class="chart-wrap"><canvas id="shareChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- 竞争格局 -->
  <div class="section" id="competition">
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title">竞争梯队划分</div>
        <div id="tierList"></div>
      </div>
      <div class="card">
        <div class="card-title">全球市场份额（2024）</div>
        <div class="chart-wrap"><canvas id="shareChart2"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">核心竞争对手详情</div>
      <div class="competitor-grid" id="competitorGrid"></div>
    </div>
  </div>

  <!-- 产品追踪 -->
  <div class="section" id="products">
    <div class="product-summary-grid" id="productSummary"></div>
    <div class="card">
      <div class="card-title">采用硅基OLED屏幕的终端产品一览 <span class="section-subtitle">（按产品类别分类，含详细参数与累计销量）</span></div>
      <div id="productCategoryContent"></div>
    </div>
  </div>

  <!-- 芯视佳 -->
  <div class="section" id="xinshijia">
    <div id="xinshijiaContent"></div>

function showSection(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function renderMarketCharts() {
  const mSize = DATA.market.globalMarketSize;
  const labels = Object.keys(mSize);
  const values = Object.values(mSize);
  
  new Chart(document.getElementById('marketChart'), {
    type: 'bar',
    data: {
      labels, datasets: [{
        label: '市场规模（亿元）',
        data: values,
        backgroundColor: labels.map(l => l.includes('E') ? 'rgba(124,58,237,0.6)' : 'rgba(0,212,255,0.6)'),
        borderColor: labels.map(l => l.includes('E') ? '#7c3aed' : '#00d4ff'),
        borderWidth: 1, borderRadius: 4
      }]
    },
    options: { ...CHART_DEFAULTS, scales: {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(30,58,95,0.5)' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(30,58,95,0.5)' } }
    }}
  });

  const sData = DATA.market.globalShipment;
  const sLabels = Object.keys(sData), sValues = Object.values(sData);
  new Chart(document.getElementById('shipmentChart'), {
    type: 'line',
    data: {
      labels: sLabels, datasets: [{
        label: '出货量（万块）',
        data: sValues,
        borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)',
        fill: true, tension: 0.4, pointBackgroundColor: '#10b981', pointRadius: 4
      }]
    },
    options: { ...CHART_DEFAULTS, scales: {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(30,58,95,0.5)' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(30,58,95,0.5)' } }
    }}
  });

  const app = DATA.market.applicationDistribution;
  new Chart(document.getElementById('appChart'), {
    type: 'doughnut',
    data: {
      labels: app.map(a=>a.name),
      datasets: [{ data: app.map(a=>a.share),
        backgroundColor: ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6'],
        borderColor: '#0a0e1a', borderWidth: 2 }]
    },
    options: { ...CHART_DEFAULTS }
  });

  const share = DATA.competition.globalShare2024;
  new Chart(document.getElementById('shareChart'), {
    type: 'pie',
    data: {
      labels: share.map(s=>s.name),
      datasets: [{ data: share.map(s=>s.share),
        backgroundColor: share.map(s=>s.color),
        borderColor: '#0a0e1a', borderWidth: 2 }]
    },
    options: { ...CHART_DEFAULTS }
  });
}

// ============================================================
// 产品追踪渲染
// ============================================================
function renderProducts() {
  const products = DATA.trackedProducts;

  // 判断是否为硅基OLED产品
  const isOled = (p) => {
    const nonOled = ['Quest 3','PICO 4 Ultra'];
    return !nonOled.some(n => p.name.includes(n));
  };

  // 统计汇总
  const catMap = {vr:"VR/MR",ar:"AR",evf:"EVF",drone:"FPV",special:"特种"};
  const categories = [...new Set(products.map(p=>p.category))];
  const oledProducts = products.filter(p => isOled(p));
  const totalSales = products.reduce((sum, p) => {
    const num = p.sales.replace(/[^0-9.]/g, '');
    if (num && p.sales.includes('万台')) return sum + parseFloat(num);
    return sum;
  }, 0);

  const summaryData = [
    {icon:"📱",count:products.length,label:"追踪产品总数",sub:"覆盖6大类别"},
    {icon:"💎",count:oledProducts.length,label:"硅基OLED产品",sub:"含Micro OLED方案"},
    {icon:"📊",count:totalSales.toFixed(0),label:"累计终端销量",sub:"万台（行业估算）"},
    {icon:"🏭",count:categories.length,label:"产品类别",sub:categories.map(c=>catMap[c]).join('/')}
  ];

  document.getElementById('productSummary').innerHTML = summaryData.map(s => `
    <div class="product-summary-card">
      <div class="ps-icon">${s.icon}</div>
      <div class="ps-count">${s.count}</div>
      <div class="ps-label">${s.label}</div>
      <div class="ps-sub">${s.sub}</div>
    </div>`).join('');

  // 按类别分组渲染表格
  const catNames = {
    vr: "🥽 VR/MR 头显",
    ar: "👓 AR 智能眼镜",
    evf: "📸 电子取景器 EVF",
    drone: "🚁 无人机/FPV",
    special: "🔭 特种应用"
  };
  const catOrder = ['vr','ar','evf','drone','special'];
  const tagClass = {vr:'tag-vr',ar:'tag-ar',evf:'tag-evf',drone:'tag-drone',special:'tag-special'};

  let html = '';
  catOrder.forEach(cat => {
    const items = products.filter(p => p.category === cat);
    if (!items.length) return;
    html += `<div class="product-category">${catNames[cat]}</div>`;
    html += `<div class="product-table-wrap"><table class="product-table">
      <thead><tr>
        <th>产品</th>
        <th>品牌</th>
        <th>屏幕参数</th>
        <th>面板供应商</th>
        <th>分辨率</th>
        <th>PPI</th>
        <th>亮度</th>
        <th>刷新率</th>
        <th>售价</th>
        <th>状态</th>
        <th>累计销量</th>
      </tr></thead><tbody>`;

    items.forEach(p => {
      const oledTag = isOled(p) ? '<span class="tag-sm tag-ar">硅基OLED</span>' : '<span class="tag-sm" style="background:rgba(100,116,139,0.12);color:var(--text3)">非硅基OLED</span>';
      const catTag = `<span class="tag-sm ${tagClass[p.category]}">${p.catLabel}</span>`;
      const statusColor = p.status === '在售' ? 'var(--green)' : (p.status === '已停产' ? 'var(--red)' : (p.status === '研发中' ? 'var(--yellow)' : 'var(--text2)'));

      html += `<tr>
        <td><span class="pname">${p.emoji} ${p.name}</span><br>${oledTag} ${catTag}</td>
        <td><span class="brand">${p.brand}</span></td>
        <td class="screen-info">
          <strong>${p.screenSize}</strong><br>
          对比度 ${p.contrast}<br>
          响应 ${p.responseTime}
        </td>
        <td>${p.screenProvider}<br><span style="font-size:10px;color:var(--text3)">${p.screenModel}</span></td>
        <td>${p.resolution}</td>
        <td>${p.ppi}</td>
        <td>${p.brightness}</td>
        <td>${p.refreshRate}</td>
        <td>${p.price}</td>
        <td><span style="color:${statusColor};font-weight:600;font-size:11px">${p.status}</span>${p.statusNote ? '<br><span style="font-size:10px;color:var(--text3)">'+p.statusNote+'</span>' : ''}</td>
        <td><span class="sales-num">${p.sales || '-'}</span>${p.salesNote ? '<br><span style="font-size:10px;color:var(--text3)">'+p.salesNote+'</span>' : ''}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });

  // 产品详情卡片（仅硅基OLED产品）
  const oledOnly = products.filter(p => isOled(p));
  html += `<div style="margin-top:20px">
    <div class="card-title" style="margin-bottom:16px">硅基OLED产品详情卡片</div>
    <div class="product-detail-grid">
    ${oledOnly.map(p => `
      <div class="product-detail-card">
        <div class="pd-header">
          <div class="pd-emoji">${p.emoji}</div>
          <div>
            <div class="pd-name">${p.name}</div>
            <div class="pd-brand">${p.brand} · ${p.catLabel}</div>
          </div>
        </div>
        <div class="pd-tags">
          <span class="tag-sm tag-ar">硅基OLED</span>
          <span class="tag-sm ${tagClass[p.category]}">${p.catLabel}</span>
          <span class="tag-sm" style="background:rgba(0,212,255,0.12);color:var(--accent)">${p.status}</span>
        </div>
        <div class="pd-specs">
          <div class="pd-spec"><div class="pd-spec-label">屏幕尺寸</div><div class="pd-spec-value">${p.screenSize}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">分辨率</div><div class="pd-spec-value">${p.resolution}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">像素密度</div><div class="pd-spec-value">${p.ppi}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">最大亮度</div><div class="pd-spec-value">${p.brightness}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">刷新率</div><div class="pd-spec-value">${p.refreshRate}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">面板供应商</div><div class="pd-spec-value">${p.screenProvider}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">面板型号</div><div class="pd-spec-value" style="font-size:10px">${p.screenModel}</div></div>
          <div class="pd-spec"><div class="pd-spec-label">发布时间</div><div class="pd-spec-value">${p.released}</div></div>
        </div>
        <div class="pd-sales">
          <div class="pd-sales-label">📈 累计销量</div>
          <div class="pd-sales-value">${p.sales || '未上市'}</div>
          ${p.salesNote ? '<div class="pd-sales-note">'+p.salesNote+'</div>' : ''}
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3);line-height:1.5">${p.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;

  document.getElementById('productCategoryContent').innerHTML = html;
}
